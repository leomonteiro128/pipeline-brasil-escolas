name: "03 - Import to WordPress"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Modo simulacao (nao grava dados)"
        type: boolean
        default: false
      batch_size:
        description: "Tamanho do lote"
        default: "50"
      upload_placeholders:
        description: "Gerar e enviar imagens placeholder"
        type: boolean
        default: true
  workflow_run:
    workflows: ["02 - Transform Schools Data"]
    types: [completed]

jobs:
  import:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    concurrency: { group: wp-import, cancel-in-progress: false }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: mkdir -p data

      - name: Download transformed artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: 02-transform.yml
          name_is_regexp: true
          name: escolas-transformed-.*
          path: data/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Flatten artifact path
        run: find data -name "escolas_transformed.json" ! -path "data/escolas_transformed.json" -exec cp {} data/ \; 2>/dev/null || true

      - name: Verify input
        run: |
          [ -f data/escolas_transformed.json ] || (echo "ERRO: escolas_transformed.json nao encontrado" && exit 1)
          python -c "import json; d=json.load(open('data/escolas_transformed.json')); print(f\"Escolas: {d['metadata']['total']}\")"

      - name: Configurar taxonomias
        env:
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USER:           ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          WP_PIPELINE_TOKEN: ${{ secrets.WP_PIPELINE_TOKEN }}
        run: python scripts/setup_wp_taxonomies.py

      - name: Run import
        env:
          WP_URL:              ${{ secrets.WP_URL }}
          WP_USER:             ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          WP_PIPELINE_TOKEN:   ${{ secrets.WP_PIPELINE_TOKEN }}
          IMPORT_BATCH_SIZE:   ${{ github.event.inputs.batch_size || '50' }}
          DRY_RUN:             ${{ github.event.inputs.dry_run || 'false' }}
          UPLOAD_PLACEHOLDERS: ${{ github.event.inputs.upload_placeholders || 'true' }}
          DATA_DIR:            data
        run: python scripts/import_wp.py

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: import-log-${{ github.run_number }}
          path: data/import_log.json
          retention-days: 30
