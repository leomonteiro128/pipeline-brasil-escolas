name: "01 - Fetch INEP Data"

on:
  schedule:
    - cron: "0 3 * * 1"   # toda segunda-feira às 03h UTC
  workflow_dispatch:
    inputs:
      censo_year:
        description: "Ano do Censo Escolar"
        default: "2023"
      limit_per_uf:
        description: "Limite de escolas por estado (0 = sem limite)"
        default: "200"

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - run: pip install -r requirements.txt

      - run: mkdir -p data

      - name: Fetch escolas
        run: python scripts/fetch_inep.py
        env:
          DATA_DIR:     data
          CENSO_YEAR:   ${{ github.event.inputs.censo_year || '2023' }}
          LIMIT_PER_UF: ${{ github.event.inputs.limit_per_uf || '200' }}
          QEDU_API_KEY: ${{ secrets.QEDU_API_KEY }}

      - name: Verificar resultado
        run: |
          python -c "
          import json, sys
          d = json.load(open('data/escolas_raw.json'))
          m = d['metadata']
          print(f\"Fonte: {m['source']}\")
          print(f\"Total: {m['total']}\")
          print(f\"Ano: {m.get('censo_year', '?')}\")
          if m['total'] < 100:
              print('ERRO: poucos registros — fonte de dados falhou')
              sys.exit(1)
          print('OK: dados carregados')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: escolas-raw-${{ github.run_number }}
          path: data/escolas_raw.json
          retention-days: 7

      - name: Trigger transform
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: '02-transform.yml', ref: 'main'
            });
