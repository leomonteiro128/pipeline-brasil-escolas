name: "01 - Fetch INEP Data"

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests
      - run: mkdir -p data
      - run: python scripts/fetch_inep.py
        env: { DATA_DIR: data }
      - uses: actions/upload-artifact@v4
        with:
          name: escolas-raw-${{ github.run_number }}
          path: data/escolas_raw.json
          retention-days: 7
      - name: Trigger transform
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: '02-transform.yml', ref: 'main'
            });
