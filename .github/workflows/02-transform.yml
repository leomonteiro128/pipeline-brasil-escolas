name: "02 - Transform Schools Data"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["01 - Fetch INEP Data"]
    types: [completed]

jobs:
  transform:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: mkdir -p data
      - name: Download raw artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: 01-fetch.yml
          name_is_regexp: true
          name: escolas-raw-.*
          path: data/
          if_no_artifact_found: warn
        continue-on-error: true
      - name: Generate sample if no artifact
        run: |
          if [ ! -f data/escolas_raw.json ]; then
            python scripts/generate_sample.py
          fi
      - run: python scripts/transform_schools.py
        env: { DATA_DIR: data }
      - uses: actions/upload-artifact@v4
        with:
          name: escolas-transformed-${{ github.run_number }}
          path: data/escolas_transformed.json
          retention-days: 7
      - name: Trigger import
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: '03-import.yml', ref: 'main'
            });
