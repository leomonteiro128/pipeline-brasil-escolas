name: "02 - Transform Schools Data"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["01 - Fetch INEP Data"]
    types: [completed]

jobs:
  transform:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 20
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests
      - run: mkdir -p data

      # Gera escolas_raw.json a partir do arquivo estático no repo (sem depender de artefato)
      - name: Fetch escolas
        run: python scripts/fetch_inep.py
        env:
          DATA_DIR: data
          CENSO_YEAR: "2023"
          LIMIT_PER_UF: "200"

      - name: Transformar dados
        run: python scripts/transform_schools.py
        env: { DATA_DIR: data }

      - name: Verificar resultado
        run: |
          python -c "
          import json
          d = json.load(open('data/escolas_transformed.json'))
          m = d['metadata']
          print(f\"Total transformado: {m['total']}\")
          if m['total'] < 100:
              print('AVISO: poucos registros transformados')
              exit(1)
          print('OK')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: escolas-transformed-${{ github.run_number }}
          path: data/escolas_transformed.json
          retention-days: 7

      - name: Trigger import
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: '03-import.yml', ref: 'main'
            });
