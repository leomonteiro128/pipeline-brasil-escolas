name: Enriquecer Escolas (Gemini Search)

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Escolas por execução (máx 50, ~9s cada)'
        required: false
        default: '20'
      offset:
        description: 'Offset para continuar de onde parou (0 = começo)'
        required: false
        default: '0'
  schedule:
    # Toda segunda e quinta às 03:00 UTC — processa 20 escolas por vez
    - cron: '0 3 * * 1,4'

jobs:
  enriquecer:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Enriquecer escolas via Gemini Search
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          BATCH_SIZE:           ${{ github.event.inputs.batch_size || '20' }}
          OFFSET:               ${{ github.event.inputs.offset || '0' }}
        run: python pipeline-brasil-escolas/scripts/enriquecer-escolas.py
