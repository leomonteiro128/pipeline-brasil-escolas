name: "🚀 Deploy Completo (usar com cuidado)"

on:
  workflow_dispatch:
    inputs:
      confirmar:
        description: 'Digite CONFIRMAR para prosseguir com o deploy completo'
        required: true
        default: ''

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar confirmação
        run: |
          if [ "${{ github.event.inputs.confirmar }}" != "CONFIRMAR" ]; then
            echo "ERRO: Digite CONFIRMAR para prosseguir"
            exit 1
          fi
          echo "Confirmação aceita. Iniciando deploy completo..."

  deploy-completo:
    runs-on: ubuntu-latest
    needs: validar
    timeout-minutes: 60

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Configurar variáveis de ambiente
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> $GITHUB_ENV

      - name: Regenerar todas as páginas de estado (27 estados)
        run: python scripts/gerar_paginas_estado.py

      - name: Gerar páginas físicas de Web Stories
        run: python scripts/gerar_paginas_story.py

      - name: Injetar credenciais Supabase no config.js
        run: |
          find . -name "config.js" -exec sed -i \
            "s|'%%SUPABASE_URL%%'|'$SUPABASE_URL'|g; \
             s|'%%SUPABASE_ANON_KEY%%'|'$SUPABASE_ANON_KEY'|g" {} \;
          echo "Credenciais injetadas"

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "Chave SSH configurada"

      - name: Checkout repositório do site (branch: site)
        uses: actions/checkout@v4
        with:
          ref: site
          path: site-files
        continue-on-error: true

      - name: Corrigir permissões no servidor (pre-rsync)
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -p ${{ secrets.HOSTINGER_PORT }} \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            'find ~/public_html -name ".htaccess" -exec chmod 644 {} \; 2>/dev/null || true; \
             chmod -R u+w ~/public_html/ 2>/dev/null || true; \
             echo "Permissões corrigidas"'

      - name: Deploy via rsync (chave SSH)
        run: |
          # Deploy do site estático (branch site ou pasta site-files)
          if [ -d "site-files" ] && [ "$(ls -A site-files)" ]; then
            SITE_PATH="./site-files/"
          else
            echo "Branch 'site' não encontrado — deploy apenas dos arquivos gerados"
            SITE_PATH="."
          fi

          rsync -avz --chmod=Du+rwx,Fu+rw,go+r \
            --exclude='.git' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.env' \
            --exclude='scripts/' \
            --exclude='templates/' \
            --exclude='data/' \
            --exclude='*.md' \
            --exclude='.github/' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -p ${{ secrets.HOSTINGER_PORT }}" \
            "$SITE_PATH" \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/public_html/" \
          && echo "rsync concluído com sucesso" \
          || echo "Aviso: rsync com problemas. Verifique a chave SSH no Hostinger hPanel."

      - name: Verificar site no ar
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://brasilescolas.com.br/ || echo "000")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Site respondendo corretamente (HTTP 200)"
          else
            echo "⚠️ Site retornou HTTP $HTTP_STATUS — verificar manualmente"
          fi

      - name: Resumo do deploy
        run: |
          echo "## 🚀 Deploy Completo Concluído" >> $GITHUB_STEP_SUMMARY
          echo "- Data: $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://brasilescolas.com.br" >> $GITHUB_STEP_SUMMARY
          echo "- Servidor: ${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PORT }}" >> $GITHUB_STEP_SUMMARY
